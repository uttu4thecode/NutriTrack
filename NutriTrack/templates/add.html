<!doctype html>
<html lang="en">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>Add Food | Food Tracker</title>
	<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body class="page-manage">
	<main class="app-shell app-shell-wide">
		<header class="topbar fade-in">
			<h1>Manage Foods</h1>
			<nav class="nav-links">
				<a class="btn btn-soft" href="{{ url_for('main.index') }}">Home</a>
				<a class="btn btn-soft" href="{{ url_for('main.view_food') }}">View Foods</a>
			</nav>
		</header>

		<section class="glass-card fade-in" style="animation-delay: 120ms;">
			<h2>Add New Food</h2>
			<form action="{{ url_for('main.add_food_post') }}" method="post">
				<div class="form-grid">
					<div class="form-field">
						<label for="food_name">Food Name</label>
						<input id="food_name" name="food_name" type="text" required>
					</div>
					<div class="form-field">
						<label for="proteins">Proteins (g)</label>
						<input id="proteins" name="proteins" type="number" step="0.01" min="0" required>
					</div>
					<div class="form-field">
						<label for="carbohydrates">Carbs (g)</label>
						<input id="carbohydrates" name="carbohydrates" type="number" step="0.01" min="0" required>
					</div>
					<div class="form-field">
						<label for="fats">Fats (g)</label>
						<input id="fats" name="fats" type="number" step="0.01" min="0" required>
					</div>
					<button class="btn btn-primary" type="submit">Add Food</button>
				</div>
			</form>
		</section>

		<section class="glass-card fade-in" style="animation-delay: 220ms; margin-top: 1rem;">
			<h2>Current Foods</h2>

			{% if foods %}
			<div class="table-wrap">
				<table>
					<thead>
						<tr>
							<th>Name</th>
							<th>Protein (g)</th>
							<th>Carbs (g)</th>
							<th>Fats (g)</th>
							<th>Calories</th>
							<th>Actions</th>
						</tr>
					</thead>
					<tbody>
						{% for food in foods %}
						<tr>
							<td colspan="6">
								<form class="inline-row" action="{{ url_for('main.edit_food', food_id=food.id) }}" method="post">
									<input name="food_name" type="text" value="{{ food.name }}" required>
									<input name="proteins" type="number" step="0.01" min="0" value="{{ food.proteins }}" required>
									<input name="carbohydrates" type="number" step="0.01" min="0" value="{{ food.carbs }}" required>
									<input name="fats" type="number" step="0.01" min="0" value="{{ food.fats }}" required>
									<span class="muted">{{ '%.2f'|format(food.calories) }} kcal</span>
									<div class="row-actions">
										<button class="btn btn-soft" type="submit">Save</button>
									</div>
								</form>
								<form action="{{ url_for('main.delete_food', food_id=food.id) }}" method="post" style="margin-top: 0.5rem;">
									<button class="btn btn-danger" type="submit">Delete {{ food.name }}</button>
								</form>
							</td>
						</tr>
						{% endfor %}
					</tbody>
				</table>
			</div>
			{% else %}
			<p class="muted">No foods added yet.</p>
			{% endif %}
		</section>
	</main>
</body>
</html>
